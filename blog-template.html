<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="canonical" href="https://socialsync-7f6.pages.dev/blog">
  
  <title>Article - Social Sync Guides</title>
  <meta name="description" content="Social Sync article detail page.">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:title" content="Article - Social Sync Guides">
  <meta property="og:description" content="Social Sync article detail page.">
  <meta property="og:image" content="https://blobs.codeways.co/cdn-cgi/image/width=600,fit=scale-down,format=auto,metadata=keep,sharpen=0.5/social-sync-logo.png">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://socialsync-7f6.pages.dev/blog">
  <meta property="og:site_name" content="Social Sync">
  
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Article - Social Sync Guides">
  <meta name="twitter:description" content="Social Sync article detail page.">

  <!-- Preconnect hints for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/index.css">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
          },
          colors: {
            brand: {
              primary: '#00A3E0',
              secondary: '#6366f1',
              light: '#f8fafc',
              dark: '#0f172a'
            }
          }
        }
      }
    }
  </script>

  <!-- Custom Scrollbar & Styling -->
  <style>
    [x-cloak] { display: none !important; }
    
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #00A3E0;
    }

    .grid-bg {
      background-image: radial-gradient(rgba(0, 163, 224, 0.05) 1px, transparent 0);
      background-size: 24px 24px;
    }

    /* SEO Article Render Styling */
    .article-content h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      color: #0f172a;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: -0.02em;
      line-height: 1.3;
    }
    .article-content h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
      color: #1e293b;
      font-family: 'Outfit', sans-serif;
      line-height: 1.4;
    }
    .article-content p {
      margin-bottom: 1.25rem;
      font-size: 0.95rem;
      line-height: 1.7;
      color: #475569;
      font-family: 'Outfit', sans-serif;
    }
    .article-content ul {
      list-style-type: disc;
      padding-left: 1.5rem;
      margin-bottom: 1.5rem;
      margin-top: 0.5rem;
    }
    .article-content li {
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #475569;
    }
    .article-content strong {
      font-weight: 700;
      color: #0f172a;
    }
    
    /* Responsive Table Styling inside article */
    .article-content table {
      width: 100%;
      margin-top: 1.75rem;
      margin-bottom: 1.75rem;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .article-content th {
      background-color: #f8fafc;
      color: #0f172a;
      font-weight: 700;
      text-align: left;
      padding: 0.65rem 0.85rem;
      border-bottom: 2px solid #e2e8f0;
    }
    .article-content td {
      padding: 0.65rem 0.85rem;
      border-bottom: 1px solid #e2e8f0;
      color: #475569;
    }
    .article-content tr:hover {
      background-color: #f8fafc;
    }
  </style>

  <!-- Shared Components & Alpine.js -->
  <script src="/components.js" defer></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.14.0/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.0/dist/cdn.min.js"></script>
</head>
<body class="bg-[#f8fafc] text-[#1e293b] min-h-screen selection:bg-[#00A3E0] selection:text-white font-sans overflow-x-hidden">

  <!-- Component Navigation -->
  <shared-nav></shared-nav>

  <!-- Main Article Container -->
  <main class="py-20 px-6 grid-bg relative min-h-[85vh]">
    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-gradient-to-tr from-[#00A3E0]/10 to-indigo-500/5 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="max-w-4xl mx-auto relative z-10 pt-4">
      <article class="bg-white border border-slate-200 rounded-3xl p-6 sm:p-10 md:p-12 shadow-sm">
        
        <!-- Breadcrumbs -->
        <nav class="flex items-center space-x-2 text-xs sm:text-sm text-slate-400 mb-6 sm:mb-8 border-b border-slate-100 pb-4">
          <a href="/blog" class="hover:text-[#00A3E0] transition font-bold flex items-center gap-1.5">
            📖 Blog
          </a>
          <span class="text-slate-300">/</span>
          <span class="text-slate-800 font-bold truncate" data-field="breadcrumb-title">Article</span>
        </nav>

        <!-- Metadata -->
        <div class="flex flex-wrap items-center gap-3 mb-6 text-xs text-slate-500 font-semibold">
          <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] font-extrabold uppercase bg-[#00A3E0]/10 text-[#00A3E0]" data-field="category-badge">
            <span data-field="category-icon">📖</span> <span data-field="category-name">Guide</span>
          </span>
          <span>&bull;</span>
          <time datetime="" data-field="date">Recently Published</time>
        </div>

        <h1 class="text-2xl sm:text-3xl md:text-4xl lg:text-5xl font-extrabold text-slate-900 leading-tight font-display mb-8 border-b border-slate-100 pb-6" data-field="title">Article Headline</h1>

        <!-- Dynamic Body HTML Content -->
        <div class="article-content max-w-none text-slate-600 leading-relaxed mb-10" data-field="content">
          <p>Content is loading from the edge...</p>
        </div>

        <!-- Dynamic CTA Conversion Card -->
        <div data-field="cta-card">
          <!-- Injected dynamically by Cloudflare Pages Function -->
        </div>

      </article>
    </div>
  </main>

  <!-- Component Footer -->
  <shared-footer></shared-footer>

</body>
</html>
